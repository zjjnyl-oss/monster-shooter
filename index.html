<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>答题大炮 - 打败怪物！</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="gc"></canvas>

  <!-- 发射按钮 (游戏中常驻) -->
  <button id="fire-btn" class="fire-btn" style="display:none">发射<br>🔥</button>

  <!-- 主菜单 -->
  <div id="ui-menu" class="ui active">
    <div class="box">
      <div class="menu-icon">🔫</div>
      <h1 class="title">答题大炮</h1>
      <p class="sub">移动炮管，瞄准正确答案，开炮！</p>
      <button class="btn play" onclick="G.showLevels()">🎮 开始战斗</button>
      <button class="btn ghost" onclick="G.showHelp()">❓ 怎么玩</button>
    </div>
  </div>

  <!-- 帮助 -->
  <div id="ui-help" class="ui">
    <div class="box">
      <h2>怎么玩？</h2>
      <div class="steps">
        <div class="step"><b>👀</b> 看底部题目</div>
        <div class="step"><b>👆</b> 左右滑动移动炮管瞄准</div>
        <div class="step"><b>🔥</b> 按发射键射击正确答案</div>
        <div class="step"><b>💥</b> 命中正确 → 怪物掉血！</div>
        <div class="step"><b>❌</b> 打错了 → 你掉血！</div>
        <div class="step"><b>🏆</b> 打光怪物血量过关！</div>
      </div>
      <button class="btn ghost" onclick="G.showMenu()">返回</button>
    </div>
  </div>

  <!-- 关卡选择 -->
  <div id="ui-levels" class="ui">
    <div class="box wide">
      <h2>选择关卡</h2>
      <div class="lvgrid" id="lvgrid"></div>
      <button class="btn ghost" onclick="G.showMenu()">返回</button>
    </div>
  </div>

  <!-- 关卡开始 -->
  <div id="ui-intro" class="ui"><div class="intro" id="intro"></div></div>

  <!-- 胜利 -->
  <div id="ui-win" class="ui">
    <div class="box">
      <div class="ri">🎉</div>
      <h2 id="win-t">胜利！</h2>
      <div class="rstars" id="win-s"></div>
      <p id="win-m"></p>
      <div class="rbtns">
        <button class="btn green" id="btn-nxt" onclick="G.nextLv()">下一关 ▶</button>
        <button class="btn blue" onclick="G.retry()">再打一次</button>
        <button class="btn ghost" onclick="G.showLevels()">选关卡</button>
      </div>
    </div>
  </div>

  <!-- 失败 -->
  <div id="ui-lose" class="ui">
    <div class="box">
      <div class="ri">💀</div>
      <h2>被打败了…</h2>
      <p id="lose-m"></p>
      <div class="rbtns">
        <button class="btn blue" onclick="G.retry()">🔄 再来！</button>
        <button class="btn ghost" onclick="G.showLevels()">选关卡</button>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="game.js"></script>
</body>
</html>
